name: build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-mac:
    name: build (macos-latest)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Set up Rust (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: Build (Tauri, bundle disabled)
        run: pnpm build

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mousefly-macos-aarch64
          if-no-files-found: error
          path: |
            target/release/mousefly
            src-ui/dist/**

  build-windows:
    name: build (windows-latest)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Set up Rust (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      # WebView2 Evergreen runtime is preinstalled on windows-latest (windows-2022
      # and windows-2025) GitHub-hosted images, so no manual install step is needed.
      # If the runner image ever drops it, add the bootstrapper from
      # https://developer.microsoft.com/microsoft-edge/webview2/ here.

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: Build (Tauri, bundle disabled)
        run: pnpm build

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: mousefly-windows-x86_64
          if-no-files-found: error
          path: |
            target/release/mousefly.exe
            src-ui/dist/**

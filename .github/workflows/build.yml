name: build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-mac:
    name: build (macos-latest)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Set up Rust (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: Build (Tauri)
        run: bun run build

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mousefly-macos-aarch64
          if-no-files-found: warn
          path: |
            target/release/mousefly
            target/release/bundle/dmg/**/*.dmg
            target/release/bundle/macos/**/*.app
            src-ui/dist/**

  build-windows:
    name: build (windows-latest)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Set up Rust (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      # WebView2 Evergreen runtime is preinstalled on windows-latest (windows-2022
      # and windows-2025) GitHub-hosted images, so no manual install step is needed.

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: Build (Tauri)
        run: bun run build

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: mousefly-windows-x86_64
          if-no-files-found: warn
          path: |
            target/release/mousefly.exe
            target/release/bundle/nsis/**/*.exe
            src-ui/dist/**
